# =============================================================================
# Config for 00_prepare_data.py
# =============================================================================

# --- Run mode ---
inspect_only: false

# --- Input paths ---
paths:
  slidetags:    "/scratch/mfafouti/Mommybrain/Integration/data/Merged_n=207903_all_metadata_slide_tags.h5ad"
  slideseq_n:   "/scratch/mfafouti/Mommybrain/Integration/data/adata_neuron_subset_181663_singlets_score_330.h5ad"
  slideseq_nn:  "/scratch/mfafouti/Mommybrain/Integration/data/adata_nn_subset_78689_singlets_score_330.h5ad"

# --- Output directory ---
out_dir: "/scratch/mfafouti/Mommybrain/Integration/out"

# --- Samples to exclude from Slide-seq ---
exclude_samples:
  - "B02"   # too few cells
  - "B21"   # GD20 pregnant, unique timepoint

# --- Column map ---
# Keys: target unified column names
# Values: source column names in each dataset (null = does not exist, will be created)
column_map:
  sample_id:       ["sample",         "sample"]            # BC13, B01, etc.
  treatment:       ["treatment",      "treatment"]         # OIL, CORT, NONE
  day:             [null,             "day"]               # Slide-tags is all PD23 (hardcoded)
  cell_type_orig:  ["subclass_name",  "RCTD_first_type"]   # cell type annotation column
  position:        [null,             "coronal_section"]   # rostral/caudal; Slide-tags = NaN

# --- Cell type label harmonization ---
# Map original labels -> unified mixed-resolution labels
# Non-neurons: class level (e.g. "Astrocyte")
# Neurons: subclass level (e.g. "CA1_Pyr")
label_map_slidetags: {}
  # "Pyramidal_CA1": "CA1_Pyr"

label_map_slideseq: {}
  # "astrocyte": "Astrocyte"

# --- Defaults for missing columns ---
# Values to fill when a column_map source is null
defaults:
  slidetags:
    day: "PD23"

# --- Doublet filtering ---
# Column and value to keep for doublet filtering (Slide-tags only)
doublet_filter:
  column: "scDblFinder.class"
  keep: "singlet"

# --- HVG selection ---
n_hvg_target: 4000