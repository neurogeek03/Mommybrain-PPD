# =============================================================================
# Config for 03_scanvi_de.py
# =============================================================================

# --- Input ---
integrated_path: "/scratch/mfafouti/Mommybrain/Integration/out/configB/integrated.h5ad"
scanvi_model_path: "/scratch/mfafouti/Mommybrain/Integration/out/configB/scanvi_model"

# --- Output ---
out_dir: "/scratch/mfafouti/Mommybrain/Integration/out/configB/de"

# --- Cell grouping ---
cell_type_key: "scanvi_prediction"  # obs column defining cell type membership
treatment_key: "treatment"
day_key: "day"

# --- Primary contrast ---
day_filter: "PD23"             # restrict to this day only
group1: "CORT"                 # numerator (positive LFC = higher in group1)
group2: "OIL"

# --- Filtering thresholds ---
min_cells_per_group: 30        # skip cell type if either group has fewer cells in total
require_both_methods: true     # skip cell type unless it has cells from both slide_tags and slide_seq
max_cells_per_group: 500       # subsample within each group to this cap (null = no cap)

# --- scvi-tools DE parameters ---
# These control the posterior sampling for LFC estimation
n_samples: 1000                # posterior samples per gene
batch_size: 256                # cells processed per batch during sampling

# --- Significance thresholds (for summary table only; full results always saved) ---
lfc_threshold: 0.25            # |lfc_mean| cutoff for summary
proba_de_threshold: 0.8        # proba_de cutoff for summary
