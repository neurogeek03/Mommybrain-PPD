# =============================================================================
# Config for 01_scanvi.py
# =============================================================================

# --- Input ---
merged_path: "/scratch/mfafouti/Mommybrain/Integration/out/merged_raw.h5ad"

# --- Output ---
out_dir: "/scratch/mfafouti/Mommybrain/Integration/out"

# --- scVI / scANVI parameters ---
# Config B: sample-level batch correction
config_name: "configB"

scvi:
  n_layers: 2
  n_latent: 30
  gene_likelihood: "nb"        # negative binomial
  max_epochs: 400
  early_stopping: true
  batch_key: "sample_id"       # per-slide batch correction (implicitly captures method too)
  layer: "counts"              # raw counts layer

scanvi:
  max_epochs: 200
  early_stopping: true
  early_stopping_patience: 20
  unlabeled_category: "unknown"
  min_cells_per_label: 25   # types below this in Slide-tags are remapped to unlabeled (cells kept)

# --- Label setup ---
# Slide-tags cells use their cell_type as the scANVI label
# Slide-seq cells are set to unlabeled_category ("unknown") for semi-supervised learning
reference_method: "slide_tags"

# --- Evaluation ---
# scib metrics to compute after integration
eval_metrics: true
