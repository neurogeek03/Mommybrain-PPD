# ==========================================================================
# EdgeR Pipeline Config
# Usage: bash scripts/run_pipeline.sh config/run_config.conf
# ==========================================================================

# ========== RUN ==========
RUN_NAME="lib_size_10k_relaxed_thresholds"
H5AD_FILE="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/data/DE_after_mt_filter_108123_mincells_10_in_2_samples_slide_tags.h5ad"
COMPARISONS_CSV="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/tags_comparisons.csv"

# ========== COLUMNS ==========
CELLTYPE_COL="subclass_name"
GENE_SYMBOL_COL="gene_symbols"

# ========== PATHS ==========
WORKSPACE="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR"
APPTAINER_SIF="/scratch/mfafouti/docker/edger.sif"
OUTPUT_BASE_DIR="$WORKSPACE/out/runs"

# ========== ENVIRONMENT ==========
PYTHON="$WORKSPACE/.venv/bin/python"

# ========== EDGER FILTERS ==========
EDGER_MODEL="lrt"                # lrt or qlf
LIB_SIZE_MIN=10000               # drop pseudobulk samples with lib.size below this
FILTER_MIN_COUNT=10              # filterByExpr: min counts in a worthwhile number of samples
FILTER_MIN_TOTAL_COUNT=15        # filterByExpr: min total count across all samples
FILTER_LARGE_N=10                # filterByExpr: threshold for "large" number of samples
FILTER_MIN_PROP=0.7              # filterByExpr: min proportion of samples that must meet min.count

# ========== PLOT FILTERS ==========
PLOT_LOGFC_THRESH=0.5           # |log2FC| threshold for all plots
PLOT_FDR_THRESH=0.1            # FDR threshold for all plots
