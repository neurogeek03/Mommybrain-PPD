# ==========================================================================
# GSEA Pipeline Config
# Usage: bash scripts/run_gsea.sh config/gsea_config.conf
# ==========================================================================

# ========== INPUT ==========
# Directory containing *_edgeR_results.tsv files (one comparison)
EDGER_INPUT_DIR="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/out/runs/lib_size_50k/edger_lrt/OIL_vs_CORT"

# ========== OUTPUT ==========
# Root output directory — subfolders rnk/ and gprofiler/ created automatically
GSEA_OUT_DIR="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/GSEA/out"
RUN_NAME="update"

# ========== GPROFILER ==========
ORGANISM="rnorvegicus"
# GPROFILER_MODE="ordered"     # ordered | ora
# DE_FDR=0.05                  # edgeR FDR cutoff for selecting DE genes (ora mode only)
BACKGROUND_MODE="global"     # gene universe: global | per-celltype | none
GPROFILER_FDR=0.1            # gProfiler FDR threshold for enrichment significance

# ========== PLOTS ==========
TOP_N=30           # top N terms ranked by significance
MIN_CELLTYPES=1    # term must be significant in at least this many cell types
CELLTYPES_CSV=""
SOURCE="GO:BP"     # gProfiler source to plot (GO:BP, GO:MF, GO:CC, KEGG, REAC)