# ==========================================================================
# EdgeR Pipeline Config — Slide-seq (Slide-SeqV2)
# Usage: bash /scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/scripts/run_pipeline.sh config/run_config.conf
# Run from: /scratch/mfafouti/Mommybrain-PPD/Slide_seq/EdgeR/
# ==========================================================================

# ========== RUN ==========
RUN_NAME="lib_size_10k_slideseq"
H5AD_FILE="/scratch/mfafouti/Mommybrain-PPD/Slide_seq/EdgeR/data/All_RCTD_types_singlet_score_0_slide_seq_15_named.h5ad"
COMPARISONS_CSV="/scratch/mfafouti/Mommybrain-PPD/Slide_seq/EdgeR/config/comparisons.csv"

# ========== COLUMNS ==========
# Cell type column in obs (slide-seq uses RCTD annotations)
CELLTYPE_COL="RCTD_first_type_rat"
# Gene symbol column in var (note: singular, unlike slide-tags which uses gene_symbols)
GENE_SYMBOL_COL="gene_symbol"

# ========== PATHS ==========
WORKSPACE="/scratch/mfafouti/Mommybrain-PPD/Slide_seq/EdgeR"
# Scripts and Python env live in Slide_tags/EdgeR — reused here
SCRIPTS_DIR="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/scripts"
PYTHON="/scratch/mfafouti/Mommybrain-PPD/Slide_tags/EdgeR/.venv/bin/python"
APPTAINER_SIF="/scratch/mfafouti/docker/edger.sif"
SEURAT_ENV="/scratch/mfafouti/miniforge3/envs/seurat_env"
OUTPUT_BASE_DIR="$WORKSPACE/out/runs"
PSEUDOBULK_DIR="$WORKSPACE/out/pseudobulk_outputs"

# ========== EDGER FILTERS ==========
EDGER_MODEL="lrt"
LIB_SIZE_MIN=10000               # slide-seq has lower lib sizes than slide-tags
FILTER_MIN_COUNT=10
FILTER_MIN_TOTAL_COUNT=15
FILTER_LARGE_N=10
FILTER_MIN_PROP=0.7

# ========== PLOT FILTERS ==========
PLOT_LOGFC_THRESH=0.5
PLOT_FDR_THRESH=0.05

# ========== RCTD QUALITY FILTERS ==========
SCORE_COL="RCTD_singlet_score_rat"
SPOT_CLASS_COL="RCTD_spot_class_rat"
NEURON_SCORE_THRESH=300          # applied to Glut, Gaba, IMN cell types
NON_NEURON_SCORE_THRESH=330      # applied to NN cell types
SINGLET_ONLY_NON_NEURONS=true    # keep only spot_class==singlet for NN cell types
